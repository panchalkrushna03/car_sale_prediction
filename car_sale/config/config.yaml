# Configuration file for the car sale project

# Data paths
data:
  raw: data/raw
  processed: data/processed
  interim: data/interim
  external: data/external

# Model parameters
model:
  random_state: 42
  test_size: 0.2

# Logging
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'